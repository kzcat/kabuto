version: 2

builds:
  - main: ./cmd/kabuto
    binary: kabuto
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: checksums.txt

changelog:
  sort: asc

release:
  github:
    owner: kzcat
    name: kabuto

homebrew_casks:
  - repository:
      owner: kzcat
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    name: kabuto
    homepage: https://github.com/kzcat/kabuto
    description: "Global market dashboard for your terminal — indices, forex, crypto and commodities."
    license: MIT

scoops:
  - repository:
      owner: kzcat
      name: scoop-bucket
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    name: kabuto
    homepage: https://github.com/kzcat/kabuto
    description: "Global market dashboard for your terminal — indices, forex, crypto and commodities."
    license: MIT

aurs:
  - name: kabuto-bin
    homepage: https://github.com/kzcat/kabuto
    description: "Global market dashboard for your terminal — indices, forex, crypto and commodities."
    license: MIT
    maintainers:
      - "kzcat <kazuto.okada@gmail.com>"
    provides:
      - kabuto
    conflicts:
      - kabuto
    private_key: "{{ .Env.AUR_KEY }}"
    git_url: ssh://aur@aur.archlinux.org/kabuto-bin.git

winget:
  - name: kabuto
    publisher: kzcat
    publisher_url: https://github.com/kzcat
    short_description: "Global market dashboard for your terminal — indices, forex, crypto and commodities."
    license: MIT
    license_url: https://github.com/kzcat/kabuto/blob/main/LICENSE
    copyright: "Copyright (c) kzcat"
    homepage: https://github.com/kzcat/kabuto
    repository:
      owner: kzcat
      name: winget-pkgs
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
